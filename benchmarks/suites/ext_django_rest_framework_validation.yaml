name: ext_django_rest_framework_validation
project_name: ext_django_rest_framework
stop_on_failure: true
python_bin: current
setup_create_venv: true
setup_commands:
  - "{python_bin} -m pip install setuptools wheel"
  - "{python_bin} -m pip install -e ."
tasks:
  - name: add_serializer_validation_example
    mode: code
    description: "Add tests/test_boss_validation_example.py with a small serializer validation example consistent with existing DRF test style."
    sandbox_mode: auto
    auto_approve: true
    max_iterations: 1
    allowed_paths:
      - tests/
    expected_files:
      - tests/test_boss_validation_example.py
    required_changed_files:
      - tests/test_boss_validation_example.py
    expected_file_contains:
      tests/test_boss_validation_example.py:
        - "from rest_framework import serializers"
        - "def test_"
    validation_commands:
      - "{python_bin} -m py_compile tests/test_boss_validation_example.py"
    direct_engineer: true
    plan_override: "Create a focused test module directly in tests/. Keep it aligned with the repo's serializer validation style."
